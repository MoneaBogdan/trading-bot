# Overlay compose file for the news_alpha bot.
#
# SEPARATE from the main docker-compose.yml because the news bot has
# preconditions the price-driven bots don't:
#
#   1. A `.env.news` file (copy from `.env.news.example`, fill in
#      ANTHROPIC_API_KEY + the same Polymarket creds as polymarket/.env).
#      Required regardless of source.
#
#   2. If NEWS_SOURCE=telegram: a `.session` file from a one-time interactive
#      Telegram login (Telethon needs your phone + SMS code the first time).
#      Run the recorder locally first to create it. NOT required for the
#      default NEWS_SOURCE=treeofalpha_rest.
#
# Once preconditions are met, bring up alongside the main stack:
#
#   docker compose -f docker-compose.yml -f docker-compose.news.yml up -d
#
# Or just this overlay if the main stack is already running:
#
#   docker compose -f docker-compose.news.yml up -d news-alpha
#
# The bot defaults to POLY_DRY_RUN=true; flip only when dry-run looks clean.

services:
  news-alpha:
    build:
      context: .
      dockerfile: Dockerfile
    image: polymarket-bot:latest
    container_name: polymarket-news-alpha
    restart: unless-stopped
    env_file:
      - ./.env.news
    environment:
      LOG_DIR: /app/polymarket/logs
    volumes:
      - ./polymarket/logs:/app/polymarket/logs
      - ./polymarket/polymarket_creds.json:/app/polymarket/polymarket_creds.json
      # Telegram session file — only used when NEWS_SOURCE=telegram. The bind
      # mount is harmless for the default REST mode if the file doesn't exist
      # OR if it's just an empty file (you can `touch tree_news_recorder.session`
      # on the host if Docker complains about a missing mount source).
      - ./tree_news_recorder.session:/app/tree_news_recorder.session
    working_dir: /app
    command: ["python", "-m", "src.bots.news_alpha_runner"]
