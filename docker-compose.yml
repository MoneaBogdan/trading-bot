# Multi-variant Polymarket Up/Down latency-arb bot.
#
# Seven trader services (six per asset × timeframe + a wide-band tail probe)
# all share one image. A single ws-recorder captures the L2 orderbook for
# retroactive fill validation and backtesting.
#
# Each trader writes to its own variant-tagged log file under
# polymarket/logs/. The legacy BTC-5m variant keeps the original
# live_<date>.{log,jsonl} naming so all historical logs remain useful.
#
# All variants run dry-run by default (POLY_DRY_RUN=true in .env). Flip
# variants live one at a time after watching dry-run output for a few days.
#
# Sweet-band history:
#   2026-06-16 → original: SWEET=[0.30, 0.40] (defaults in run_live.sh).
#   2026-06-17 → main bots updated to [0.60, 0.75] after 22.5h backtest
#                showed edge concentrates in that bucket (see
#                reports/STRATEGY_FINDINGS.md). eth-5m-wide refocused to
#                [0.75, 0.90] to gather more data on the tail bucket.
#   2026-06-18 → added 15-min BTC/ETH/SOL dry-run variants. Mirroring
#                observed wallet 0x8dxd that profitably ran the same
#                strategy on 15-min markets. Same thresholds/band as 5m;
#                will tune after we see real fires.

x-image: &image
  build:
    context: .
    dockerfile: Dockerfile
  image: polymarket-bot:latest
  restart: unless-stopped
  env_file:
    - ./polymarket/.env
  volumes:
    - ./polymarket/logs:/app/polymarket/logs
    - ./polymarket/polymarket_creds.json:/app/polymarket/polymarket_creds.json

services:
  # --- 5-minute markets (Chainlink-aggregate resolution → keep Coinbase confirm) ---

  trader-btc-5m:
    <<: *image
    container_name: polymarket-trader-btc-5m
    command: ["bash", "run_live.sh"]
    environment:
      ASSET: BTC
      TIMEFRAME_MIN: "5"
      THRESHOLD: "0.10"
      REQUIRE_CONFIRM: "1"
      SWEET_LO: "0.60"
      SWEET_HI: "0.75"
      POLY_BOOK_WS_CACHE: "${POLY_BOOK_WS_CACHE:-false}"

  trader-eth-5m:
    <<: *image
    container_name: polymarket-trader-eth-5m
    command: ["bash", "run_live.sh"]
    environment:
      ASSET: ETH
      TIMEFRAME_MIN: "5"
      THRESHOLD: "0.13"
      REQUIRE_CONFIRM: "1"
      SWEET_LO: "0.60"
      SWEET_HI: "0.75"
      POLY_BOOK_WS_CACHE: "${POLY_BOOK_WS_CACHE:-false}"

  trader-sol-5m:
    <<: *image
    container_name: polymarket-trader-sol-5m
    command: ["bash", "run_live.sh"]
    environment:
      ASSET: SOL
      TIMEFRAME_MIN: "5"
      THRESHOLD: "0.20"
      REQUIRE_CONFIRM: "1"
      SWEET_LO: "0.60"
      SWEET_HI: "0.75"
      POLY_BOOK_WS_CACHE: "${POLY_BOOK_WS_CACHE:-false}"

  # Tail-bucket probe — ETH 5m with band [0.75, 0.90]. The 2026-06-17 backtest
  # showed mixed signals above 0.75 (some buckets profitable, some not). This
  # variant captures more data specifically in that range. Separate logs via
  # VARIANT_SUFFIX=wide → bot=eth-5m-wide.
  trader-eth-5m-wide:
    <<: *image
    container_name: polymarket-trader-eth-5m-wide
    command: ["bash", "run_live.sh"]
    environment:
      ASSET: ETH
      TIMEFRAME_MIN: "5"
      THRESHOLD: "0.13"
      REQUIRE_CONFIRM: "1"
      SWEET_LO: "0.75"
      SWEET_HI: "0.90"
      POLY_BOOK_WS_CACHE: "${POLY_BOOK_WS_CACHE:-false}"
      VARIANT_SUFFIX: "wide"

  # --- 15-minute markets (Chainlink-aggregate resolution → keep Coinbase confirm) ---
  # Why: mirroring wallet 0x8dxd, observed running this same strategy
  # profitably on 15-min slots. Dry-run while we collect data.

  trader-btc-15m:
    <<: *image
    container_name: polymarket-trader-btc-15m
    command: ["bash", "run_live.sh"]
    environment:
      ASSET: BTC
      TIMEFRAME_MIN: "15"
      THRESHOLD: "0.10"
      REQUIRE_CONFIRM: "1"
      SWEET_LO: "0.60"
      SWEET_HI: "0.75"
      POLY_BOOK_WS_CACHE: "${POLY_BOOK_WS_CACHE:-false}"

  trader-eth-15m:
    <<: *image
    container_name: polymarket-trader-eth-15m
    command: ["bash", "run_live.sh"]
    environment:
      ASSET: ETH
      TIMEFRAME_MIN: "15"
      THRESHOLD: "0.13"
      REQUIRE_CONFIRM: "1"
      SWEET_LO: "0.60"
      SWEET_HI: "0.75"
      POLY_BOOK_WS_CACHE: "${POLY_BOOK_WS_CACHE:-false}"

  trader-sol-15m:
    <<: *image
    container_name: polymarket-trader-sol-15m
    command: ["bash", "run_live.sh"]
    environment:
      ASSET: SOL
      TIMEFRAME_MIN: "15"
      THRESHOLD: "0.20"
      REQUIRE_CONFIRM: "1"
      SWEET_LO: "0.60"
      SWEET_HI: "0.75"
      POLY_BOOK_WS_CACHE: "${POLY_BOOK_WS_CACHE:-false}"

  # --- Hourly markets (Binance-only resolution → Coinbase confirm disabled) ---
  # Note: hourly bots are largely idle (95%+ no_market_in_window skips). The
  # sweet-band tweak is for consistency; doesn't materially change behavior.

  trader-btc-1h:
    <<: *image
    container_name: polymarket-trader-btc-1h
    command: ["bash", "run_live.sh"]
    environment:
      ASSET: BTC
      TIMEFRAME_MIN: "60"
      THRESHOLD: "0.10"
      REQUIRE_CONFIRM: "0"
      SWEET_LO: "0.60"
      SWEET_HI: "0.75"
      POLY_BOOK_WS_CACHE: "${POLY_BOOK_WS_CACHE:-false}"

  trader-eth-1h:
    <<: *image
    container_name: polymarket-trader-eth-1h
    command: ["bash", "run_live.sh"]
    environment:
      ASSET: ETH
      TIMEFRAME_MIN: "60"
      THRESHOLD: "0.13"
      REQUIRE_CONFIRM: "0"
      SWEET_LO: "0.60"
      SWEET_HI: "0.75"
      POLY_BOOK_WS_CACHE: "${POLY_BOOK_WS_CACHE:-false}"

  trader-sol-1h:
    <<: *image
    container_name: polymarket-trader-sol-1h
    command: ["bash", "run_live.sh"]
    environment:
      ASSET: SOL
      TIMEFRAME_MIN: "60"
      THRESHOLD: "0.20"
      REQUIRE_CONFIRM: "0"
      SWEET_LO: "0.60"
      SWEET_HI: "0.75"
      POLY_BOOK_WS_CACHE: "${POLY_BOOK_WS_CACHE:-false}"

  # --- WS recorder: shared, captures orderbook for retroactive validation ---

  ws-recorder:
    <<: *image
    container_name: polymarket-ws-recorder
    command: ["bash", "run_ws_recorder.sh"]

  # --- Hyperliquid funding-arb monitor (phase 1: paper-PnL only) ---
  # Public REST polls only — no secrets, no execution. Logs to hyperliquid/logs/.
  # Goal: ≥7 days of paper-PnL on BTC/ETH/SOL to verify the 3–12% APR claim
  # survives real spreads + modeled slippage. See hyperliquid/README.md.
  hyperliquid-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    image: polymarket-bot:latest
    restart: unless-stopped
    container_name: hyperliquid-monitor
    working_dir: /app/hyperliquid
    command: ["python3", "funding_monitor.py"]
    env_file:
      - ./hyperliquid/.env
    volumes:
      - ./hyperliquid/logs:/app/hyperliquid/logs

  # --- Read-only fleet observability and log control center ---
  # Serves an authenticated web UI that indexes bot JSONL + Hyperliquid logs
  # into SQLite. It does not receive trading credentials and mounts runtime logs
  # read-only. Bind defaults to localhost; use SSH tunneling for remote access:
  #   ssh -L 8080:127.0.0.1:8080 root@<host>
  control-center:
    build:
      context: .
      dockerfile: Dockerfile
    image: polymarket-bot:latest
    restart: unless-stopped
    container_name: trading-control-center
    working_dir: /app
    command: ["python3", "control-center/app.py"]
    environment:
      CONTROL_CENTER_USER: "${CONTROL_CENTER_USER:-admin}"
      CONTROL_CENTER_PASSWORD: "${CONTROL_CENTER_PASSWORD:-change-me}"
      CONTROL_CENTER_SYNC_INTERVAL_S: "${CONTROL_CENTER_SYNC_INTERVAL_S:-30}"
      POLYMARKET_LOG_DIR: /app/polymarket/logs
      HYPERLIQUID_LOG_DIR: /app/hyperliquid/logs
      CONTROL_CENTER_DB: /app/control-center/data/control_center.sqlite3
      DOCKER_SOCKET: /var/run/docker.sock
    ports:
      - "${CONTROL_CENTER_BIND:-127.0.0.1}:8080:8080"
    volumes:
      - ./polymarket/logs:/app/polymarket/logs:ro
      - ./hyperliquid/logs:/app/hyperliquid/logs:ro
      - ./control-center/data:/app/control-center/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
